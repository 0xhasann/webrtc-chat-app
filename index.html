<!DOCTYPE html>
<html>

<body>
    <h3>WebSocket Chat App</h3>

    <input id="room" placeholder="Enter Room ID" />
    <button onclick="join()">Join</button>

    <br><br>

    <input id="msg" placeholder="Message" />
    <button onclick="sendMsg()">Send</button>
    <button onclick="createOffer()">Start Video Call</button>
    <video id="localVideo" autoplay muted playsinline></video>
    <video id="remoteVideo" autoplay playsinline></video>

    <pre id="log"></pre>

    <script>
        const socket = new WebSocket("ws://localhost:3001");
        let pc;
        let roomId = "";
                                            let localStream;

        const log = (text) => {
            document.getElementById("log").textContent += text + "\n";
        };

        socket.onopen = () => {
            log("Socket connected");
        };

        socket.onmessage = async (event) => {
            const message = JSON.parse(event.data);

            if (message.type === "offer") {
                log("Received offer");
                await startMedia();
                createPeerConnection();

                await pc.setRemoteDescription(message.offer);

                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);

                socket.send(JSON.stringify({
                    type: "answer",
                    roomId: roomId,
                    answer
                }));
                log("Received Offer: ");

            }

            if (message.type === "answer") {
                log("Received answer");
                await pc.setRemoteDescription(message.answer);
            }

            if (message.type === "ice-candidate") {
                if (pc) {
                    await pc.addIceCandidate(message.candidate);
                }
                log("ice-candidate: ");

            }
            log("Received: " + JSON.stringify(message));
        };

        function join() {
            const input = document.getElementById("room");
            if (!input) {
                log("roomId could not be empty");
                return;
            }
            roomId = input.value.trim();
            if (!roomId) {
                log("RoomId cannot be empty");
                return;
            }

            console.log("Joining room:", roomId);

            socket.send(JSON.stringify({
                type: "join",
                roomId
            }));
            log("Joined room: " + roomId);
        }

        function sendMsg() {
            roomId = document.getElementById("room").value;
            const message = document.getElementById("msg").value;

            socket.send(JSON.stringify({
                type: "signal",
                roomId,
                data: message
            }));

            log("Sent: " + message);
        }

        function createPeerConnection() {
            pc = new RTCPeerConnection();
            log("Ice Candidate ");

            // send ICE
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.send(JSON.stringify({
                        type: "ice-candidate",
                        roomId: roomId,
                        candidate: event.candidate
                    }));
                }
            };
            // receive remote stream
            pc.ontrack = (event) => {
                document.getElementById("remoteVideo").srcObject = event.streams[0];
            };

            // add local tracks
            localStream.getTracks().forEach(track => {
                pc.addTrack(track, localStream);
            });
        }

        async function createOffer() {
            await startMedia();
            createPeerConnection();

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            socket.send(JSON.stringify({
                type: "offer",
                roomId: roomId,
                offer
            }));

            log("Offer sent");
        }
   async function startMedia() {
        localStream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: true
        });

        document.getElementById("localVideo").srcObject = localStream;
    }
    

    </script>
</body>

</html>
