<!doctype html>


<html>

<head>
    <title>Waves</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta charset="utf-8">
    <script type="module" src="index.js"></script>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div id="app">
        <div class="container">
            <div class="infobox">
                <p id="login-form">
                    Enter a username:
                    <input id="name" type="text" maxlength="12" required autocomplete="username" inputmode="verbatim"
                        placeholder="Username">
                    <input type="button" id="loginBtn" name="login" value="Log in">
                </p>
                <p id="welcome-text" style="display:none;"></p>
            </div>
            <ul id="user-list"></ul>
        </div>
        <div id="camerabox">
            <video id="received_video" autoplay></video>
            <span id="remote-name-label" class="video-label"></span>
            <video id="local_video" autoplay muted></video>
            <span id="local-name-label" class="video-label local-label"></span>
            <div class="controls">
                <button id="micBtn">
                    <img src="mic.png" />
                    <span class="tooltip">Mute</span>
                </button>
                <button id="videoBtn">
                    <img src="cam_video.png" />
                    <span class="tooltip">Start Video</span>
                </button>
                <button id="share-button" style="display:none;">
                    <img src="share.webp" />
                    <span class="tooltip">Start Sharing</span>
                </button>

                <button id="hangup-button" class="active" style="display:none;">
                    <img src="call.png" />
                    <span class="tooltip">Hang Up</span>
                </button>
            </div>

        </div>
        <div id="chat-container">
            <div id="chat-header">
                <div id="chat-user">Chat</div>
            </div>
            <div id="messages"></div>
            <div class="chat-input-container">
                <input id="chat-input" disabled type="text" placeholder="Type message..." />
                <button id="send-btn" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
                        <path d="M2 21l21-9L2 3v7l15 2-15 2z" />
                    </svg>
                </button>
            </div>
        </div>

    </div>
    </div>
</body>

</html>
