<!doctype html>


<html>

<head>
    <title>WebSocket Chat Demo with WebRTC Calling</title>
    <meta charset="utf-8">
    <!-- <script type="text/javascript" src="dist/index.js"></script> -->
    <script type="module" src="dist/index.js"></script>
</head>

<body>
    <div class="container">
        <div class="infobox">
            <p>Enter a username: <input id="name" type="text" maxlength="12" required autocomplete="username"
                    inputmode="verbatim" placeholder="Username">
                <input type="button" id="loginBtn" name="login" value="Log in">
            </p>
        </div>
        <ul id="user-list"></ul>
        <div id="camerabox">
            <video id="received_video" autoplay></video>
            <video id="local_video" autoplay muted></video>
            <button id="hangup-button"  style="display:none;">
                Hang Up
            </button>
        </div>
       
      

    </div>
</body>

</html>
